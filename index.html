<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hongbis viewer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230a7d68'/%3E%3Cpath d='M18 20h28v6H18zm0 18h28v6H18zm8-9h20v6H26z' fill='%23fff7ef'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260422154519" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">hongbis / github pages</p>
          <h1>JSON 조회 화면</h1>
          <p class="lede">
            최신 글, 날짜별 인덱스, 카테고리별 인덱스, 보고 JSON을 한 화면에서 확인합니다.
          </p>
        </div>
        <div class="hero-card">
          <div class="hero-stat">
            <span class="hero-label">최신 수집 수</span>
            <strong id="hero-post-count">-</strong>
          </div>
          <div class="hero-stat">
            <span class="hero-label">마지막 갱신</span>
            <strong id="hero-updated-at">-</strong>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="panel controls">
          <div class="control-block">
            <label for="view-select">보기</label>
            <select id="view-select">
              <option value="latest">최신</option>
              <option value="date">날짜별</option>
              <option value="category">카테고리별</option>
              <option value="report">리포트</option>
            </select>
          </div>
          <div class="control-block grow">
            <label for="search-input">제목 검색</label>
            <input id="search-input" type="search" placeholder="제목 일부를 입력하세요" />
          </div>
          <button id="reload-button" class="reload-button" type="button">새로고침</button>
        </section>

        <section class="grid">
          <article class="panel panel-list">
            <div class="panel-header">
              <h2 id="list-title">목록</h2>
              <span id="list-count" class="pill">0</span>
            </div>
            <div class="category-bar">
              <span class="category-label">카테고리</span>
              <div id="category-filter" class="category-filter"></div>
            </div>
            <ul id="post-list" class="post-list"></ul>
            <div id="pagination" class="pagination" hidden>
              <button id="page-prev" class="pagination-button" type="button">이전</button>
              <span id="page-status" class="pagination-status">1 / 1</span>
              <button id="page-next" class="pagination-button" type="button">다음</button>
            </div>
          </article>

          <article class="panel panel-json">
            <div class="panel-header">
              <h2>JSON</h2>
              <a id="raw-link" href="#" target="_blank" rel="noreferrer">raw 열기</a>
            </div>
            <pre id="json-viewer" class="json-viewer"></pre>
          </article>
        </section>
      </main>
    </div>

    <script src="./app.js?v=20260422154519" defer></script>
  </body>
</html>
